</div>

<button class="text-on-surface-variant hover:bg-white/10 transition-colors duration-200 p-2 rounded-full active:scale-95 transition-transform group">

<span class="absolute inset-0 rounded-full bg-gradient-to-r from-red-500 to-orange-400 blur-xl opacity-0 group-hover:opacity-40 transition-opacity duration-300"></span>
<div class="w-3 h-3 rounded-full bg-white shadow-[0_0_10px_white] animate-pulse"></div>
